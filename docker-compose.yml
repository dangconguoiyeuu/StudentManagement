services:
  mysql-db:
    image: mysql:8.0
    container_name: student_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: student_management
      MYSQL_ROOT_PASSWORD: dcnyuu
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./student_management.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdcnyuu"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  spring-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student_backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/student_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: dcnyuu
    depends_on:
      mysql-db:
        condition: service_healthy

volumes:
  db_data:
